name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: make build
        run: make build

      - name: make vet
        run: make vet

      - name: make lint
        run: make lint

      # Windows-specific ledger locking has no native CI coverage in this
      # workflow; release gating runs on Linux, matching the existing runners.
      - name: make test
        run: make test

      - name: GoReleaser configuration check
        run: make release-check

      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run github.com/goreleaser/goreleaser/v2@v2.17.0 release --clean
