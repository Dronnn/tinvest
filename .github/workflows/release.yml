name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: make build
        run: make build

      - name: make vet
        run: make vet

      - name: make lint
        run: make lint

      # The Windows ledger-locking path (internal/ledger/flock_windows.go) has no
      # native CI coverage anywhere: CI runs on Linux and macOS, and this release
      # job runs on Linux. Windows binaries are cross-compiled and shipped, but
      # their file locking is exercised only by the compiler, never by running
      # the test suite on a Windows runner.
      - name: make test
        run: make test

      - name: GoReleaser configuration check
        run: make release-check

      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run github.com/goreleaser/goreleaser/v2@v2.17.0 release --clean
