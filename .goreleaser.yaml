version: 2

project_name: tinvest

builds:
  - id: tinvest
    main: ./cmd/tinvest
    binary: tinvest
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X main.version={{ .Version }}

archives:
  - id: tinvest
    ids:
      - tinvest
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - AGENTS.md
      - COMMANDS.md
      - LICENSE
      - NOTICE
      - THIRD_PARTY_LICENSES.md

checksum:
  name_template: "checksums.txt"
